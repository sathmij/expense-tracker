<div class="card">
  <div class="page-header">
    <div class="heading-group">
      <span class="icon-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
          <path d="M21.21 15.89A10 10 0 1 1 8 2.83" />
          <path d="M22 12A10 10 0 0 0 12 2v10z" />
        </svg>
      </span>
      <h2>Summary</h2>
    </div>
  </div>

  <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

  <div class="stat-card" *ngIf="summary">
    <span class="stat-label">Total spent</span>
    <span class="stat-value">{{ summary.total | currency }}</span>
  </div>

  <table class="data-table">
    <thead>
      <tr>
        <th>Category</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let entry of categoryEntries">
        <td>{{ entry[0] }}</td>
        <td>{{ entry[1] | currency }}</td>
      </tr>
      <tr *ngIf="categoryEntries.length === 0">
        <td colspan="2" class="empty-cell">
          <div class="empty-state">
            <span class="icon-circle">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
              </svg>
            </span>
            <strong>No expenses recorded yet.</strong>
            <span>Add some expenses to see your summary.</span>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
