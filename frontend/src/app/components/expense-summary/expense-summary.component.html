<h2>Summary</h2>

<div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

<p *ngIf="summary"><strong>Total spent:</strong> {{ summary.total }}</p>

<table border="1" cellpadding="8">
  <thead>
    <tr>
      <th>Category</th>
      <th>Total</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let entry of categoryEntries">
      <td>{{ entry[0] }}</td>
      <td>{{ entry[1] }}</td>
    </tr>
    <tr *ngIf="categoryEntries.length === 0">
      <td colspan="2">No expenses recorded yet.</td>
    </tr>
  </tbody>
</table>
