<div class="card">
  <div class="page-header">
    <div class="heading-group">
      <span class="icon-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
          <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4" />
          <path d="M3 5v14a2 2 0 0 0 2 2h16v-5" />
          <path d="M18 12a2 2 0 0 0 0 4h4v-4Z" />
        </svg>
      </span>
      <div>
        <h2>Expenses</h2>
        <p>View and manage your expenses</p>
      </div>
    </div>
    <a routerLink="/add" class="btn btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
        <line x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg>
      Add Expense
    </a>
  </div>

  <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

  <table class="data-table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Category</th>
        <th>Amount</th>
        <th>Description</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let expense of expenses">
        <td>{{ expense.date }}</td>
        <td>{{ expense.category }}</td>
        <td>{{ expense.amount | currency }}</td>
        <td>{{ expense.description }}</td>
        <td class="actions-cell">
          <a [routerLink]="['/edit', expense.id]">Edit</a>
          <button type="button" (click)="deleteExpense(expense.id)">Delete</button>
        </td>
      </tr>
      <tr *ngIf="expenses.length === 0">
        <td colspan="5" class="empty-cell">
          <div class="empty-state">
            <span class="icon-circle">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
              </svg>
            </span>
            <strong>No expenses recorded yet.</strong>
            <span>Add your first expense to get started.</span>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
