<h2>Expenses</h2>

<a routerLink="/add">Add Expense</a>
<a routerLink="/summary">View Summary</a>

<table border="1" cellpadding="8">
  <thead>
    <tr>
      <th>Date</th>
      <th>Category</th>
      <th>Amount</th>
      <th>Description</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let expense of expenses">
      <td>{{ expense.date }}</td>
      <td>{{ expense.category }}</td>
      <td>{{ expense.amount }}</td>
      <td>{{ expense.description }}</td>
      <td>
        <a [routerLink]="['/edit', expense.id]">Edit</a>
        <button type="button" (click)="deleteExpense(expense.id)">Delete</button>
      </td>
    </tr>
    <tr *ngIf="expenses.length === 0">
      <td colspan="5">No expenses recorded yet.</td>
    </tr>
  </tbody>
</table>
